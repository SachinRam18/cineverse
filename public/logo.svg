<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>CineVerses logo icon</title>
  <desc>CineVerses streaming platform icon</desc>
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e50914"/>
      <stop offset="40%"  stop-color="#ff4d00"/>
      <stop offset="75%"  stop-color="#ff6030"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>

  <!-- C arc with navy blue outline -->
  <path d="M 414,155 A 185,185 0 1,0 414,345 L 360,308 A 110,110 0 1,1 360,192 Z" fill="url(#cGrad)" stroke="#020818" stroke-width="10" stroke-linejoin="round"/>

  <!-- Play triangle with navy blue outline -->
  <polygon points="215,170 215,330 370,250" fill="white" opacity="0.97" stroke="#020818" stroke-width="10" stroke-linejoin="round"/>
</svg>
